<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Vitchakorn Poonyakanok Favicon</title>
  <desc id="desc">Concept A.9: A map pin filled with a theme-aware blue gradient and an EKG wave tracing a VP monogram cutout in negative space.</desc>
  <defs>
    <linearGradient id="c1-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop class="stop-start" offset="0%" />
      <stop class="stop-end" offset="100%" />
    </linearGradient>
    <mask id="ma9-pin">
      <rect width="256" height="256" fill="white" />
      <!-- Thick A.9 EKG wave tracing the VP monogram (cutout) -->
      <path d="M 35,98 C 45,90 55,90 65,98 C 75,98 80,105 85,98 L 95,50 L 120,165 L 140,55 C 172,55 188,67 188,83 C 188,99 172,106 140,106 C 160,106 170,98 185,98 C 195,106 205,106 216,98" fill="none" stroke="black" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    </mask>
  </defs>
  <style>
    /* Default dark theme blue colors */
    .stop-start { stop-color: #58a6ff; }
    .stop-end { stop-color: #2f81f7; }

    /* Light theme blue colors */
    @media (prefers-color-scheme: light) {
      .stop-start { stop-color: #0757bd; }
      .stop-end { stop-color: #2f81f7; }
    }
  </style>
  <path d="M 128,218 C 75,153 55,123 55,88 A 73,73 0 1,1 201,88 C 201,123 181,153 128,218 Z" fill="url(#c1-grad)" mask="url(#ma9-pin)" />
</svg>
